<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaxia de Rosas Azules 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue:#00aaff; --deep-blue:#0033aa; --glow:rgba(0,150,255,0.6); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000005; font-family:'Cormorant Garamond',Georgia,serif; color:#fff; cursor:crosshair; }
        canvas { display:block; }
        .greeting {
            position:absolute; top:28px; left:0; right:0; text-align:center;
            pointer-events:none; z-index:20; font-size:2.4rem; font-weight:600;
            background:linear-gradient(135deg,#88ccff,#3399ff,#aaddff);
            -webkit-background-clip:text; background-clip:text; color:transparent;
            filter:drop-shadow(0 0 18px rgba(0,140,255,0.7));
            animation:fadeInDown 1.4s ease-out;
        }
        .greeting small {
            font-size:1rem; display:block; color:rgba(120,190,255,0.8);
            margin-top:6px; font-weight:300; font-style:italic; letter-spacing:2px;
        }
        #lyrics-display {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:30; text-align:center; pointer-events:none; width:80vw;
            font-size:clamp(1.1rem,4vw,2rem); font-style:italic; color:#aaddff;
            opacity:0; transition:opacity 0.8s ease;
            text-shadow:0 0 20px rgba(0,160,255,0.9);
        }
        #lyrics-display.visible { opacity:1; }
        #music-btn {
            position:absolute; bottom:28px; right:24px; z-index:40;
            display:flex; align-items:center; gap:10px;
            background:rgba(0,20,60,0.55); backdrop-filter:blur(12px);
            border:1px solid rgba(0,150,255,0.4); border-radius:50px;
            padding:10px 20px; cursor:pointer;
            font-family:'Rajdhani',sans-serif; color:#88ccff; letter-spacing:2px;
        }
        .badge-control { position:absolute; bottom:28px; left:24px; font-size:0.65rem; color:rgba(100,180,255,0.7); font-family:'Rajdhani'; }
        #qbadge { position:absolute; top:16px; right:16px; font-size:0.6rem; color:rgba(60,140,255,0.5); font-family:'Rajdhani'; }
        @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        #loading-screen {
            position:fixed; inset:0; background:#000005; z-index:999;
            display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
            transition:opacity 1s ease;
        }
        #loading-screen.hidden { opacity:0; pointer-events:none; }
        .loading-text { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:#44aaff; letter-spacing:4px; animation:pulse 1.5s infinite; }
        .loading-bar-wrap { width:200px; height:3px; background:rgba(0,100,255,0.2); border-radius:3px; overflow:hidden; }
        .loading-bar { height:100%; width:0%; background:linear-gradient(90deg,#0044ff,#00ccff); border-radius:3px; animation:loadbar 2.5s ease forwards; }
        @keyframes loadbar { to{width:100%} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-text">🌹 CARGANDO GALAXIA...</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div class="greeting">
    🌹 Galaxia de Rosas Azules 🌹
    <small>✦ Un universo de pétalos para ti ✦</small>
</div>
<div id="lyrics-display"></div>
<button id="music-btn" onclick="toggleMusic()">
    <span id="music-icon">▶</span>
    <span id="music-label">REPRODUCIR</span>
</button>
<div class="badge-control">🌀 360° | Galaxia Estelar</div>
<div id="qbadge">CARGANDO...</div>

<!-- 🎵 Cambia el src para actualizar la canción -->
<audio id="bg-music" loop>
    <source src="musica/Download-_2_.mp3" type="audio/mpeg">
</audio>

<script async src="https://ga.jspm.io/npm:es-module-shims@1.8.3/dist/es-module-shims.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

function hideLoading() {
    const ls = document.getElementById('loading-screen');
    ls.classList.add('hidden');
    setTimeout(() => ls.remove(), 1200);
}

// ── CALIDAD ──────────────────────────────────────────────────────────────────
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const Q = {
    totalFlowers : isMobile ? 5000 : 14000,
    bloomStrength: 1.0,
    pixelRatio   : Math.min(window.devicePixelRatio, 2)
};
document.getElementById('qbadge').textContent = isMobile ? '📱 MÓVIL' : '🖥️ DESKTOP';

// ── LÍRICAS ───────────────────────────────────────────────────────────────────
const lyrics = [
    { text:"Eres perfecta como el universo",                 time:2  },
    { text:"Entre estrellas te encontré",       time:7  },
    { text:"Todo brilla cuando sonries",     time:12 },
    { text:"Contigo el cosmos flores",         time:17 },
    { text:"Eres la rosa que ilumina el cielo", time:22 }
];
const bgMusic  = document.getElementById('bg-music');
const lyricsEl = document.getElementById('lyrics-display');
let musicStartTime=0, musicPlaying=false, lyricsInterval=null;
window.toggleMusic = function() {
    if (!musicPlaying) {
        bgMusic.play().then(() => {
            musicPlaying=true;
            document.getElementById('music-icon').textContent='⏸';
            musicStartTime=performance.now()/1000;
            lyricsInterval=setInterval(updateLyrics,500);
        });
    } else {
        bgMusic.pause(); musicPlaying=false;
        document.getElementById('music-icon').textContent='▶';
        clearInterval(lyricsInterval);
        lyricsEl.classList.remove('visible');
    }
};
function updateLyrics() {
    const elapsed=performance.now()/1000-musicStartTime;
    const cur=[...lyrics].reverse().find(l=>elapsed>=l.time);
    if (cur && elapsed<cur.time+4) { lyricsEl.textContent=cur.text; lyricsEl.classList.add('visible'); }
    else lyricsEl.classList.remove('visible');
}

// ── ESCENA ────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(15,10,20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Q.pixelRatio);
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), Q.bloomStrength, 0.5, 0.80));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.autoRotate=true;

// ── TEXTURA PARTÍCULA GALAXIA ─────────────────────────────────────────────────
function createGalaxyParticleTex() {
    const c=document.createElement('canvas'); c.width=c.height=64;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.2,'#33aaff');
    g.addColorStop(0.5,'#0044ff'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
    return new THREE.CanvasTexture(c);
}

// ── GALAXIA ───────────────────────────────────────────────────────────────────
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(Q.totalFlowers*3);
const col=new Float32Array(Q.totalFlowers*3);
for (let i=0;i<Q.totalFlowers;i++) {
    const r=Math.pow(Math.random(),0.6)*16;
    const theta=r*0.5+Math.floor(Math.random()*4)*(Math.PI/2);
    const sp=(Math.random()-0.5)*1.2;
    pos[i*3]=Math.cos(theta+sp)*r; pos[i*3+1]=(Math.random()-0.5)*(2-r*0.1); pos[i*3+2]=Math.sin(theta+sp)*r;
    col[i*3]=0.5; col[i*3+1]=0.8; col[i*3+2]=1.0;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
const galaxy=new THREE.Points(geo,new THREE.PointsMaterial({
    size:0.18, vertexColors:true, map:createGalaxyParticleTex(),
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
}));
scene.add(galaxy);

// ── NÚCLEO ────────────────────────────────────────────────────────────────────
const core=new THREE.Mesh(
    new THREE.SphereGeometry(1.2,32,32),
    new THREE.MeshBasicMaterial({color:0x00aaff})
);
scene.add(core);

// ════════════════════════════════════════════════════════════════════════════════
// 🌹  ROSA REALISTA — dibujada con Canvas 2D y convertida a Sprite de Three.js
// ════════════════════════════════════════════════════════════════════════════════

/**
 * Dibuja una rosa azul realista en un CanvasRenderingContext2D.
 * cx, cy  → centro de la flor
 * r       → radio base de los pétalos
 */
function drawBlueRose(ctx, cx, cy, r) {

    // Función auxiliar: gradiente radial de pétalo
    function petalGrad(x1,y1,x2,y2, inner='#cce8ff', mid='#2260c8', outer='#060f30') {
        const g=ctx.createLinearGradient(x1,y1,x2,y2);
        g.addColorStop(0, inner); g.addColorStop(0.4, mid); g.addColorStop(1, outer);
        return g;
    }

    // ── Pétalos traseros (capa 0) ─────────────────────────────────────────────
    const layer0=[
        {a:-0.3, spread:1.15},
        {a: Math.PI+0.3, spread:1.15},
    ];
    layer0.forEach(({a,spread})=>{
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.55*spread,-r*0.4, -r*0.3*spread,-r*1.3, 0,-r*1.5);
        ctx.bezierCurveTo( r*0.3*spread,-r*1.3,  r*0.55*spread,-r*0.4, 0,0);
        ctx.fillStyle=petalGrad(0,0,0,-r*1.5,'#8ab8e8','#0e2f7a','#020818');
        ctx.globalAlpha=0.45;
        ctx.fill();
        ctx.restore();
    });

    // ── Capa 1 — pétalos exteriores ───────────────────────────────────────────
    const angles1=[0, Math.PI*0.4, Math.PI*0.8, Math.PI*1.2, Math.PI*1.6];
    angles1.forEach((a,i)=>{
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(a + i*0.08);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.6,-r*0.3, -r*0.5,-r*1.2, 0,-r*1.4);
        ctx.bezierCurveTo( r*0.5,-r*1.2,  r*0.6,-r*0.3, 0,0);
        ctx.fillStyle=petalGrad(0,0,0,-r*1.4,'#b8d8ff','#1a4db0','#040e28');
        ctx.globalAlpha=0.82;
        ctx.fill();
        // vena central
        ctx.beginPath();
        ctx.moveTo(0,-r*0.1);
        ctx.quadraticCurveTo(0,-r*0.75, 0,-r*1.35);
        ctx.strokeStyle='rgba(140,200,255,0.35)';
        ctx.lineWidth=r*0.04;
        ctx.stroke();
        // venas laterales
        [-0.3,0.3].forEach(side=>{
            ctx.beginPath();
            ctx.moveTo(0,-r*0.2);
            ctx.quadraticCurveTo(side*r*0.4,-r*0.7, side*r*0.35,-r*1.1);
            ctx.strokeStyle='rgba(120,190,255,0.2)';
            ctx.lineWidth=r*0.025;
            ctx.stroke();
        });
        ctx.restore();
    });

    // ── Capa 2 — pétalos medios ───────────────────────────────────────────────
    const angles2=[Math.PI*0.2, Math.PI*0.6, Math.PI*1.0, Math.PI*1.4, Math.PI*1.8];
    angles2.forEach((a,i)=>{
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(a + i*0.06);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.48,-r*0.25, -r*0.4,-r*1.0, 0,-r*1.15);
        ctx.bezierCurveTo( r*0.4,-r*1.0,   r*0.48,-r*0.25, 0,0);
        ctx.fillStyle=petalGrad(0,0,0,-r*1.15,'#d0e8ff','#2060cc','#050e2a');
        ctx.globalAlpha=0.88;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0,-r*0.1);
        ctx.quadraticCurveTo(0,-r*0.6, 0,-r*1.1);
        ctx.strokeStyle='rgba(160,215,255,0.38)';
        ctx.lineWidth=r*0.04;
        ctx.stroke();
        ctx.restore();
    });

    // ── Capa 3 — pétalos interiores ───────────────────────────────────────────
    const angles3=[0, Math.PI*0.5, Math.PI*1.0, Math.PI*1.5];
    angles3.forEach((a,i)=>{
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(a + i*0.1 + 0.25);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.36,-r*0.2, -r*0.3,-r*0.78, 0,-r*0.9);
        ctx.bezierCurveTo( r*0.3,-r*0.78,  r*0.36,-r*0.2, 0,0);
        ctx.fillStyle=petalGrad(0,0,0,-r*0.9,'#e0f0ff','#3377dd','#060f30');
        ctx.globalAlpha=0.92;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0,-r*0.08);
        ctx.quadraticCurveTo(0,-r*0.45, 0,-r*0.85);
        ctx.strokeStyle='rgba(180,225,255,0.4)';
        ctx.lineWidth=r*0.04;
        ctx.stroke();
        ctx.restore();
    });

    // ── Capa 4 — capullo central ──────────────────────────────────────────────
    ctx.globalAlpha=1;
    const angles4=[0, Math.PI*0.67, Math.PI*1.33];
    angles4.forEach((a,i)=>{
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(a + i*0.18);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(-r*0.22,-r*0.15, -r*0.18,-r*0.52, 0,-r*0.62);
        ctx.bezierCurveTo( r*0.18,-r*0.52,  r*0.22,-r*0.15, 0,0);
        ctx.fillStyle=petalGrad(0,0,0,-r*0.62,'#f0f8ff','#4488ee','#080e2e');
        ctx.globalAlpha=0.95;
        ctx.fill();
        ctx.restore();
    });

    // ── Disco central / pistilo ───────────────────────────────────────────────
    ctx.globalAlpha=1;
    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.18);
    cg.addColorStop(0,'#fffbe0'); cg.addColorStop(0.5,'#ffd060'); cg.addColorStop(1,'#7a4008');
    ctx.beginPath(); ctx.arc(cx,cy,r*0.18,0,Math.PI*2);
    ctx.fillStyle=cg; ctx.fill();

    // Estambres
    for (let i=0;i<10;i++) {
        const sa=(i/10)*Math.PI*2;
        const sr=r*0.14;
        const ex=cx+Math.cos(sa)*sr, ey=cy+Math.sin(sa)*sr;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(sa)*r*0.04, cy+Math.sin(sa)*r*0.04);
        ctx.lineTo(ex,ey);
        ctx.strokeStyle='#ffe060'; ctx.lineWidth=r*0.03; ctx.stroke();
        ctx.beginPath(); ctx.arc(ex,ey,r*0.04,0,Math.PI*2);
        ctx.fillStyle='#fff080'; ctx.fill();
    }

    // Brillo especular en el pétalo
    ctx.globalAlpha=0.13;
    const sg=ctx.createRadialGradient(cx-r*0.18,cy-r*0.45,0, cx-r*0.18,cy-r*0.45,r*0.38);
    sg.addColorStop(0,'white'); sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx-r*0.18,cy-r*0.45,r*0.38,0,Math.PI*2);
    ctx.fillStyle=sg; ctx.fill();
    ctx.globalAlpha=1;
}

/**
 * Genera una THREE.Texture con una rosa dibujada en canvas.
 * size: tamaño en px del canvas cuadrado
 */
function createRoseTexture(size=256) {
    const canvas=document.createElement('canvas');
    canvas.width=canvas.height=size;
    const ctx=canvas.getContext('2d');
    // Fondo transparente
    ctx.clearRect(0,0,size,size);
    drawBlueRose(ctx, size/2, size/2, size*0.30);
    return new THREE.CanvasTexture(canvas);
}

// Pre-generar la textura (una sola vez, compartida por todos los sprites)
const ROSE_TEXTURE = createRoseTexture(512);

/**
 * Crea un Sprite 3D con la textura de rosa.
 * scale: tamaño visual en la escena
 */
function createRose3D(scale) {
    const mat=new THREE.SpriteMaterial({
        map: ROSE_TEXTURE,
        transparent: true,
        blending: THREE.NormalBlending,
        depthWrite: false,
        sizeAttenuation: true,
    });
    const sprite=new THREE.Sprite(mat);
    sprite.scale.setScalar(scale * 2.2);
    return sprite;
}

// ── ROSAS ORBITALES ───────────────────────────────────────────────────────────
const rosesGroup=new THREE.Group();
for (let i=0;i<30;i++) {
    const r=3+Math.random()*10;
    const a=Math.random()*Math.PI*2;
    const rose=createRose3D(0.55+Math.random()*0.45);
    rose.position.set(Math.cos(a)*r,(Math.random()-0.5)*2,Math.sin(a)*r);
    rosesGroup.add(rose);
}
scene.add(rosesGroup);

// ── LUCES ─────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x224466,1.2));
const pLight=new THREE.PointLight(0x00ffff,2,30);
scene.add(pLight);
const warmLight=new THREE.PointLight(0x0066ff,1.5,25);
warmLight.position.set(-8,5,-8);
scene.add(warmLight);

// ── ESTRELLAS ─────────────────────────────────────────────────────────────────
const starGeo=new THREE.BufferGeometry();
const starArr=new Float32Array(9000);
for (let i=0;i<9000;i++) starArr[i]=(Math.random()-0.5)*100;
starGeo.setAttribute('position',new THREE.BufferAttribute(starArr,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.05})));


// ================================================================
// ====================== INICIO PLANETA ==========================
// ================================================================
const planetGroup=new THREE.Group();

const planetMesh=new THREE.Mesh(
    new THREE.SphereGeometry(2.6,64,64),
    new THREE.MeshStandardMaterial({color:0x0055cc,emissive:0x001155,emissiveIntensity:0.6,roughness:0.4,metalness:0.3})
);
planetGroup.add(planetMesh);

const atmosphereMesh=new THREE.Mesh(
    new THREE.SphereGeometry(2.75,64,64),
    new THREE.MeshBasicMaterial({color:0x0099ff,transparent:true,opacity:0.08,side:THREE.BackSide})
);
planetGroup.add(atmosphereMesh);

const bandMesh=new THREE.Mesh(
    new THREE.TorusGeometry(2.62,0.08,8,64),
    new THREE.MeshBasicMaterial({color:0x33aaff,transparent:true,opacity:0.5})
);
bandMesh.rotation.x=Math.PI/2;
planetGroup.add(bandMesh);

const ring1Mesh=new THREE.Mesh(
    new THREE.RingGeometry(3.2,4.2,128),
    new THREE.MeshBasicMaterial({color:0x0077ff,side:THREE.DoubleSide,transparent:true,opacity:0.55})
);
ring1Mesh.rotation.x=Math.PI/2.4;
planetGroup.add(ring1Mesh);

const ring2Mesh=new THREE.Mesh(
    new THREE.RingGeometry(4.4,5.6,128),
    new THREE.MeshBasicMaterial({color:0x00ccff,side:THREE.DoubleSide,transparent:true,opacity:0.25})
);
ring2Mesh.rotation.x=Math.PI/2.4;
planetGroup.add(ring2Mesh);

const rdp=new Float32Array(600*3);
for (let i=0;i<600;i++){
    const ang=Math.random()*Math.PI*2,rad=3.2+Math.random()*2.4;
    rdp[i*3]=Math.cos(ang)*rad; rdp[i*3+1]=(Math.random()-0.5)*0.15; rdp[i*3+2]=Math.sin(ang)*rad;
}
const rdGeo=new THREE.BufferGeometry();
rdGeo.setAttribute('position',new THREE.BufferAttribute(rdp,3));
const ringDust=new THREE.Points(rdGeo,new THREE.PointsMaterial({
    color:0x88ddff,size:0.06,transparent:true,opacity:0.7,
    blending:THREE.AdditiveBlending,depthWrite:false
}));
ringDust.rotation.x=Math.PI/2.4;
planetGroup.add(ringDust);

planetGroup.position.set(0,-3,0);
scene.add(planetGroup);

const planetLight=new THREE.PointLight(0x0088ff,3,20);
planetLight.position.set(0,2,3);
planetGroup.add(planetLight);
// ================================================================
// ========================= FIN PLANETA ==========================
// ================================================================


// ================================================================
// ======================= ROSA CENTRAL ===========================
// ================================================================

// Rosa central grande — textura de mayor resolución
const ROSE_TEX_LARGE = createRoseTexture(768);

const centralRoseMat=new THREE.SpriteMaterial({
    map: ROSE_TEX_LARGE,
    transparent:true,
    blending:THREE.NormalBlending,
    depthWrite:false,
    sizeAttenuation:true,
});
const centralRose=new THREE.Sprite(centralRoseMat);
centralRose.scale.setScalar(5.5);
centralRose.position.set(0,3.8,0);

const centralRoseGroup=new THREE.Group();
centralRoseGroup.position.set(0,-3,0);
centralRoseGroup.add(centralRose);
scene.add(centralRoseGroup);

const roseLight=new THREE.PointLight(0x0044ff,2.5,10);
roseLight.position.set(0,4.5,0);
centralRoseGroup.add(roseLight);
// ================================================================
// ==================== FIN ROSA CENTRAL ==========================
// ================================================================


// ── ANIMACIÓN ─────────────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    const time=performance.now()*0.001;

    galaxy.rotation.y    += 0.001;
    rosesGroup.rotation.y += 0.0008;
    core.scale.setScalar(1+Math.sin(time*2)*0.05);

    // Escala pulsante suave en cada rosa orbital para simular vida
    rosesGroup.children.forEach((s,i)=>{
        const base=s.userData.baseScale ?? (s.userData.baseScale=s.scale.x);
        const pulse=1+Math.sin(time*1.2+i*0.8)*0.06;
        s.scale.setScalar(base*pulse);
    });

    // ── Planeta ──
    planetMesh.rotation.y     += 0.003;
    atmosphereMesh.rotation.y -= 0.001;
    ring1Mesh.rotation.z      += 0.0005;
    ring2Mesh.rotation.z      -= 0.0004;
    ringDust.rotation.z       += 0.0007;
    planetGroup.rotation.y    += 0.0006;

    // ── Rosa central ──
    centralRose.position.y     = 3.8+Math.sin(time*1.1)*0.4;
    // Escala pulsante de la rosa central (respiración)
    const cp=1+Math.sin(time*0.9)*0.07;
    centralRose.scale.setScalar(5.5*cp);
    centralRoseGroup.rotation.y += 0.002;

    controls.update();
    composer.render();
}

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    composer.setSize(innerWidth,innerHeight);
});

hideLoading();
animate();
</script>
</body>
</html>
